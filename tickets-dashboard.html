<!doctype html>
<html lang="en" data-admin-locked="true">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tickets Dashboard | Essy Singer</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
  <link rel="shortcut icon" href="./assets/favicon.svg?v=2" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="./js/admin-gate.js" defer></script>
  <link rel="stylesheet" href="./css/custom.css" />
  <style>
    html[data-admin-locked="true"] main { visibility: hidden; }
  </style>
</head>
<body class="page-ready">
  <main class="mx-auto max-w-6xl px-4 py-10">
    <div class="flex flex-wrap items-center justify-between gap-3">
      <h1 class="font-display text-4xl text-white">Ticket Dashboard</h1>
      <div class="flex gap-2">
        <input id="event-filter" class="rounded-lg border border-amber-200/30 bg-black/30 px-3 py-2 text-white" placeholder="event id" />
        <input id="admin-key" class="rounded-lg border border-amber-200/30 bg-black/30 px-3 py-2 text-white" placeholder="backup access key (optional)" />
        <button id="load-tickets" class="btn-secondary rounded-full px-4 py-2 text-sm">Load</button>
        <button id="export-csv" class="btn-primary rounded-full px-4 py-2 text-sm">Export CSV</button>
      </div>
    </div>

    <section class="mt-6 grid gap-6 lg:grid-cols-2">
      <article class="section-shell p-4">
        <h2 class="font-display text-2xl text-white">Tickets</h2>
        <div class="mt-3 overflow-x-auto">
          <table class="min-w-full text-sm text-amber-50/90">
            <thead>
              <tr class="text-left text-xs uppercase tracking-wide text-amber-200">
                <th class="px-2 py-2">Holder</th>
                <th class="px-2 py-2">Event</th>
                <th class="px-2 py-2">Status</th>
                <th class="px-2 py-2">Check-in</th>
              </tr>
            </thead>
            <tbody id="tickets-body"></tbody>
          </table>
        </div>
      </article>

      <article class="section-shell p-4">
        <h2 class="font-display text-2xl text-white">Scan Logs</h2>
        <ul id="logs-list" class="mt-3 space-y-2 text-sm text-amber-50/85"></ul>
      </article>
    </section>
  </main>
  <script src="./js/tickets-dashboard.js?v=20260329b" defer></script>
</body>
</html>
