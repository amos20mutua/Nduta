<!doctype html>
<html lang="en" data-admin-locked="true">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Website Editor | Essy Singer</title>
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
  <link rel="shortcut icon" href="../assets/favicon.svg?v=2" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../js/admin-gate.js" defer></script>
  <link rel="stylesheet" href="../css/custom.css" />
  <style>
    html[data-admin-locked="true"] main { visibility: hidden; }
  </style>
</head>
<body class="page-ready">
  <main class="mx-auto max-w-5xl px-4 py-10">
    <div class="flex flex-wrap items-center justify-between gap-3">
      <div>
        <h1 class="font-display text-4xl text-white">Website Editor</h1>
        <p class="mt-2 text-sm text-amber-50/80">Easy Form Mode: type in boxes, click Save. No coding needed.</p>
      </div>
      <a href="./index.html" class="btn-secondary rounded-full px-4 py-2 text-sm">Back</a>
    </div>

    <section class="section-shell mt-4 p-4">
      <p class="text-sm text-amber-50/85">Quick steps: 1) Click <strong>Load All</strong> 2) Edit fields (use <strong>Upload Image</strong> where needed) 3) Click <strong>Save</strong> on a section or <strong>Save All</strong>.</p>
    </section>

    <section class="section-shell mt-6 p-4">
      <label class="text-xs uppercase tracking-wide text-amber-200" for="functions-base-url">Functions Base URL</label>
      <input id="functions-base-url" class="mt-2 w-full rounded-lg border border-amber-200/30 bg-black/30 px-3 py-2 text-white" placeholder="https://YOUR-PROJECT.functions.supabase.co" />
      <label class="mt-3 block text-xs uppercase tracking-wide text-amber-200" for="anon-key">Supabase Anon Key</label>
      <input id="anon-key" class="mt-2 w-full rounded-lg border border-amber-200/30 bg-black/30 px-3 py-2 text-white" placeholder="Public anon key" />
      <label class="mt-3 block text-xs uppercase tracking-wide text-amber-200" for="admin-key">Legacy Admin Key (optional fallback)</label>
      <input id="admin-key" class="mt-2 w-full rounded-lg border border-amber-200/30 bg-black/30 px-3 py-2 text-white" placeholder="Leave blank when using username/password login" />
      <div class="mt-3 flex flex-wrap gap-2">
        <button id="load-all" class="btn-secondary rounded-full px-4 py-2 text-sm">Load All</button>
        <button id="save-all" class="btn-primary rounded-full px-4 py-2 text-sm">Save All</button>
      </div>
      <p id="editor-feedback" class="mt-3 text-sm text-amber-100/80"></p>
    </section>

    <section id="editor-sections" class="mt-6 grid gap-4"></section>
  </main>
  <script src="../js/admin-editor.js" defer></script>
</body>
</html>
