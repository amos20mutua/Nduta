<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Events | Essy Singer</title>
  <meta name="description" content="Upcoming and recent ministry events for Essy Singer." />
  <meta property="og:title" content="Events | Essy Singer" />
  <meta property="og:description" content="Explore upcoming gatherings, ticket moments, and recent ministry events." />
  <meta property="og:image" content="./assets/og-image.jpg" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="/events.html" />
  <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
  <link rel="shortcut icon" href="./assets/favicon.svg?v=2" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./css/custom.css" />
</head>
<body>
  <div id="site-header"></div>

  <main id="main-content" class="mx-auto max-w-6xl px-4 py-12 sm:px-6 lg:px-8">
    <section class="reveal relative overflow-hidden rounded-3xl border border-amber-200/20 bg-black/40 p-8 sm:p-10">
      <div class="pointer-events-none absolute -left-8 -top-8 h-36 w-36 rounded-full bg-amber-300/20 blur-2xl"></div>
      <p id="events-eyebrow" class="text-xs uppercase tracking-[0.16em] text-amber-200">Events</p>
      <h1 id="events-title" class="mt-2 font-display text-5xl text-white">Worship Nights & Gatherings</h1>
      <p id="events-subtitle" class="mt-3 max-w-2xl text-sm text-amber-50/80">Explore upcoming gatherings, ticket moments when available, and recent ministry events.</p>
      <div id="events-tags" class="mt-5 flex flex-wrap gap-2"></div>
    </section>

    <section id="upcoming" class="mt-8">
      <div id="events-upcoming-list" class="grid gap-6"></div>
    </section>

    <section id="recent-events-section" class="mt-10 hidden">
      <div class="mb-5 flex flex-wrap items-end justify-between gap-3">
        <div>
          <p class="text-xs uppercase tracking-[0.16em] text-amber-200">Archive</p>
          <h2 class="mt-2 font-display text-3xl text-white sm:text-4xl">Recent Gatherings</h2>
        </div>
        <p class="max-w-xl text-sm text-amber-50/75">Past ministry moments remain here so visitors can still discover the story, atmosphere, and heart behind the gatherings.</p>
      </div>
      <div id="events-recent-list" class="grid gap-6"></div>
    </section>
  </main>

  <div id="site-footer"></div>
  <script src="./js/app.js" defer></script>
  <script src="./js/events.js" defer></script>
</body>
</html>
