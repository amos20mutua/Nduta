<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Essy Singer | Worship | Gospel | Hope</title>
  <meta name="description" content="Official website of Essy Singer. Worship music, events, tickets, and contact." />
  <meta property="og:title" content="Essy Singer | Official Website" />
  <meta property="og:description" content="Worship | Gospel | Hope" />
  <meta property="og:image" content="./assets/og-image.jpg" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="/index.html" />
  <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
  <link rel="shortcut icon" href="./assets/favicon.svg?v=2" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./css/custom.css" />
</head>
<body class="min-h-screen">
  <div id="site-header"></div>

  <main id="main-content">
    <section class="relative isolate min-h-screen overflow-hidden">
      <img id="hero-image" src="./assets/hero.jpg" alt="Essy Singer worship scene" class="hero-parallax absolute inset-0 h-full w-full object-cover" loading="eager" />
      <video id="hero-video" class="absolute inset-0 hidden h-full w-full object-cover" autoplay muted loop playsinline aria-hidden="true"></video>
      <div id="hero-overlay" class="absolute inset-0 bg-black/60"></div>
      <div class="hero-noise hero-glow absolute inset-0"></div>
      <div class="soft-orb soft-orb-1 parallax-layer" data-depth="0.07" aria-hidden="true"></div>
      <div class="soft-orb soft-orb-2 parallax-layer" data-depth="0.05" aria-hidden="true"></div>

      <div class="relative mx-auto grid min-h-screen max-w-6xl items-end gap-10 px-4 pb-16 pt-24 sm:px-6 lg:px-8">
        <div class="hero-copy pb-6">
          <p class="reveal hero-kicker">Nairobi, Kenya | Live Worship Ministry</p>
          <h1 id="hero-title" class="reveal max-w-4xl font-display text-6xl leading-[0.92] text-white sm:text-7xl lg:text-8xl"></h1>
          <p id="hero-subtitle" class="reveal mt-5 max-w-2xl text-lg text-amber-100 sm:text-2xl"></p>
          <p id="hero-scripture" class="reveal mt-5 max-w-2xl text-sm text-white/85 sm:text-base"></p>
          <div class="reveal mt-10 flex flex-wrap gap-3">
            <a id="hero-watch-cta" href="./music.html" class="btn-primary inline-flex rounded-full px-6 py-3 text-sm font-semibold uppercase tracking-wide">Watch Live</a>
            <a id="hero-book-cta" href="./contact.html" class="btn-secondary inline-flex rounded-full px-6 py-3 text-sm font-semibold uppercase tracking-wide">Book Essy</a>
          </div>
          <article id="hero-human-note" class="reveal hero-human-note mt-8">
            <p class="text-xs uppercase tracking-[0.15em] text-amber-100/90">From the Heart</p>
            <p id="hero-human-note-text" class="mt-2 text-sm text-amber-50/90">Worship with depth, prayer, and authenticity.</p>
            <div class="hero-wave mt-3" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span></div>
          </article>
        </div>
      </div>
      <p class="scroll-hint hidden md:block">Scroll</p>
    </section>

    <section data-home-section="story" class="mx-auto max-w-6xl px-4 py-24 sm:px-6 lg:px-8">
      <article class="reveal story-shell p-7 sm:p-10">
        <p id="story-eyebrow" class="story-eyebrow">About</p>
        <h2 id="story-title" class="mt-3 font-display text-4xl sm:text-5xl"></h2>
        <p id="story-intro" class="story-intro mt-4 max-w-3xl"></p>
      </article>
      <div id="story-blocks" class="story-flow mt-7"></div>
    </section>
  </main>

  <div id="site-footer"></div>
  <script src="./js/app.js" defer></script>
  <script src="./js/home.js" defer></script>
</body>
</html>
