<!doctype html>
<html lang="en" data-admin-locked="true">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Scan Tickets | Essy Singer</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
  <link rel="shortcut icon" href="./assets/favicon.svg?v=2" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="./js/admin-gate.js" defer></script>
  <script src="https://unpkg.com/html5-qrcode" defer></script>
  <link rel="stylesheet" href="./css/custom.css" />
  <style>
    html[data-admin-locked="true"] main { visibility: hidden; }
  </style>
</head>
<body class="page-ready">
  <main class="mx-auto max-w-3xl px-4 py-10">
    <h1 class="font-display text-4xl text-white">Ticket Scanner</h1>
    <p class="mt-2 text-sm text-amber-50/80">Staff-only check-in tool.</p>

    <div class="mt-6 rounded-2xl border border-amber-200/20 bg-black/30 p-4">
      <label class="text-xs uppercase tracking-wide text-amber-200" for="event-id">Event ID</label>
      <input id="event-id" class="mt-2 w-full rounded-lg border border-amber-200/30 bg-black/30 px-3 py-2 text-white" placeholder="event id" />
      <label class="mt-4 block text-xs uppercase tracking-wide text-amber-200" for="admin-key">Admin Key</label>
      <input id="admin-key" class="mt-2 w-full rounded-lg border border-amber-200/30 bg-black/30 px-3 py-2 text-white" placeholder="legacy admin key (optional fallback)" />
      <div id="reader" class="mt-4 overflow-hidden rounded-lg"></div>
      <textarea id="manual-token" class="mt-4 w-full rounded-lg border border-amber-200/30 bg-black/30 px-3 py-2 text-white" rows="4" placeholder="Paste QR token manually"></textarea>
      <button id="manual-validate" class="btn-primary mt-3 inline-flex rounded-full px-5 py-2 text-sm font-semibold">Validate Token</button>
      <p id="scan-result" class="mt-4 text-sm"></p>
    </div>
  </main>
  <script src="./js/scan.js?v=20260329b" defer></script>
</body>
</html>
